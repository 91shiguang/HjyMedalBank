<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no">
  <title>勋章银行</title>
  <link rel="icon" href="assets/images/medal.png" type="image/png">
  <link rel="stylesheet" href="package/bootstrap.min.css">
  <link rel="stylesheet" href="index.css">
  <link rel="stylesheet" href="app/common/common.css">
  <link rel="stylesheet" href="app/views/bbl-v010/bblv010.css">
  <link rel="stylesheet" href="app/views/bbl-v020/bblv020.css">
  <link rel="stylesheet" href="app/views/bbl-v030/bblv030.css">
  <link rel="stylesheet" href="app/views/bbl-v040/bblv040.css">
  <link rel="stylesheet" href="app/views/bbl-v050/bblv050.css">
  <link rel="stylesheet" href="app/views/bbl-v060/bblv060.css">
</head>

<body>
  <div id="main_page" class="d-flex flex-column main-page">
    <div class="d-flex justify-content-between main-header">
      <button class="main-tab active" id="main_tab_0" onclick="changeMainTab(0)">
        <img class="tab-img" src="assets/images/search.png">
        <span>查询</span>
      </button>
      <button class="main-tab" id="main_tab_1" onclick="changeMainTab(1)">
        <img class="tab-img" src="assets/images/save.png">
        <span>存储</span>
      </button>
      <button class="main-tab" id="main_tab_2" onclick="changeMainTab(2)">
        <img class="tab-img" src="assets/images/shop.png">
        <span>支出</span>
      </button>
      <button class="main-tab" id="main_tab_3" onclick="changeMainTab(3)">
        <img class="tab-img" src="assets/images/borrow.png">
        <span>借用</span>
      </button>
      <button class="main-tab" id="main_tab_4" onclick="changeMainTab(4)">
        <img class="tab-img" src="assets/images/setting.png">
        <span>设置</span>
      </button>
    </div>
    <div class="main-content">
      <div id="tab_content_0" class="tab-content d-block"></div>
      <div id="tab_content_1" class="tab-content"></div>
      <div id="tab_content_2" class="tab-content"></div>
      <div id="tab_content_3" class="tab-content"></div>
      <div id="tab_content_4" class="tab-content"></div>
    </div>
  </div>
  <audio id="tab_change_audio" class="d-none" src="assets/audio/tab_change.mp3" preload="auto" controls></audio>
  <audio id="borrow_success_audio" class="d-none" src="assets/audio/borrow_success.mp3" preload="auto" controls></audio>
  <audio id="click_audio" class="d-none" src="assets/audio/click.mp3" preload="auto" controls></audio>
  <audio id="popup_audio" class="d-none" src="assets/audio/popup.mp3" preload="auto" controls></audio>
  <audio id="repayment_audio" class="d-none" src="assets/audio/repayment.mp3" preload="auto" controls></audio>
  <audio id="sad_audio" class="d-none" src="assets/audio/sad.mp3" preload="auto" controls></audio>
  <audio id="save_success_audio" class="d-none" src="assets/audio/save_success.mp3" preload="auto" controls></audio>
  <audio id="expense_success_audio" class="d-none" src="assets/audio/shop_success.mp3" preload="auto" controls></audio>
  <script src="package/bootstrap.min.js"></script>
  <script src="package/d3.min.js"></script>
  <script src="package/jquery.min.js"></script>
  <script src="package/localforage.min.js"></script>
  <script src="app/common/message.js"></script>
  <script src="app/common/constant.js"></script>
  <script src="app/code/codes.js"></script>
  <script src="app/model/billModel.js"></script>
  <script src="app/model/settingModel.js"></script>
  <script src="app/model/medalModel.js"></script>
  <script src="app/code/codeManager.js"></script>
  <script src="app/common/dataBase.js"></script>
  <script src="app/common/commonUtil.js"></script>
  <script src="app/views/bbl-v010/bblv010.js"></script>
  <script src="app/views/bbl-v020/bblv020.js"></script>
  <script src="app/views/bbl-v030/bblv030.js"></script>
  <script src="app/views/bbl-v040/bblv040.js"></script>
  <script src="app/views/bbl-v050/bblv050.js"></script>
  <script src="app/views/bbl-v060/bblv060.js"></script>
  <script src="app/common/pageUtil.js"></script>
  <script src="index.js"></script>
</body>

</html>
