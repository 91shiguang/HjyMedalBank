<div class="dialog bblv240-dialog">
  <img class="dialog-header-img" width="200" src="assets/images/tom_and_jerry_03.png">
  <div id="bblv240_title" class="modal-header"></div>
  <div class="modal-body">
    <div id="register_body" class="content d-flex flex-column gap-4">
      <div class="d-flex flex-column gap-3">
        <div class="d-flex gap-3">
          <span class="fw-bold">账号</span>
          <span id="register_account_error" class="text-danger"></span>
        </div>
        <div class="w-100 px-3">
          <input autocomplete="off" type="text" id="register_account" class="w-100" placeholder="请输入身份证后6位"
            maxlength="6">
        </div>
      </div>
      <div class="d-flex flex-column gap-3">
        <div class="d-flex gap-3">
          <span class="fw-bold">密码</span>
          <span id="register_pwd_error" class="text-danger"></span>
        </div>
        <div class="w-100 px-3 position-relative">
          <input autocomplete="off" type="password" id="register_pwd" class="w-100" placeholder="请设置6位数字的密码"
            maxlength="6">
          <img id="register_pwd_eye" width="30" class="eye-img"
            onclick="bblv240.togglePwd('register_pwd', 'register_pwd_eye')">
        </div>
      </div>
      <div class="d-flex flex-column gap-3">
        <div class="d-flex gap-3">
          <span class="fw-bold">确认密码</span>
          <span id="register_pwd_confirm_error" class="text-danger"></span>
        </div>
        <div class="w-100 px-3 position-relative">
          <input autocomplete="off" type="password" id="register_pwd_confirm" class="w-100" placeholder="请输入上述相同的密码"
            maxlength="6">
          <img id="register_pwd_eye_cfm" width="30" class="eye-img"
            onclick="bblv240.togglePwd('register_pwd_confirm', 'register_pwd_eye_cfm')">
        </div>
      </div>
    </div>
    <div id="edit_body" class="content d-flex flex-column gap-4">
      <div class="d-flex flex-column gap-3">
        <div class="d-flex gap-3">
          <span class="fw-bold">注册时的账号</span>
          <span id="edit_account_error" class="text-danger"></span>
        </div>
        <div class="w-100 px-3">
          <input autocomplete="off" type="text" id="edit_account" class="w-100" placeholder="请输入身份证后6位" maxlength="6">
        </div>
      </div>
      <div class="d-flex flex-column gap-3">
        <div class="d-flex gap-3">
          <span class="fw-bold">新密码</span>
          <span id="edit_pwd_error" class="text-danger"></span>
        </div>
        <div class="w-100 px-3 position-relative">
          <input autocomplete="off" type="password" id="edit_pwd" class="w-100" placeholder="请设置6位数字的密码" maxlength="6">
          <img id="edit_pwd_eye" width="30" class="eye-img" onclick="bblv240.togglePwd('edit_pwd', 'edit_pwd_eye')">
        </div>
      </div>
      <div class="d-flex flex-column gap-3">
        <div class="d-flex gap-3">
          <span class="fw-bold">确认密码</span>
          <span id="edit_pwd_confirm_error" class="text-danger"></span>
        </div>
        <div class="w-100 px-3 position-relative">
          <input autocomplete="off" type="password" id="edit_pwd_confirm" class="w-100" placeholder="请输入上述相同的密码"
            maxlength="6">
          <img id="edit_pwd_eye_cfm" width="30" class="eye-img"
            onclick="bblv240.togglePwd('edit_pwd_confirm', 'edit_pwd_eye_cfm')">
        </div>
      </div>
    </div>
    <div id="bblv240_register_footer" class="footer">
      <div class="btn-div">
        <button type="button" onclick="bblv240.register()">注册</button>
      </div>
    </div>
    <div id="bblv240_edit_footer" class="footer justify-content-between">
      <div class="btn-div">
        <button type="button" onclick="bblv240.close()">取消</button>
      </div>
      <div class="btn-div">
        <button type="button" onclick="bblv240.confirm()">确定</button>
      </div>
    </div>
  </div>
</div>
